plugins {
    id 'net.minecraftforge.gradle' version '6.0.+'
}

version = '1.0.0'
group = 'com.mark.createlawn'
archivesBaseName = 'createlawn'

java.toolchain.languageVersion = JavaLanguageVersion.of(17)

minecraft {
    mappings channel: 'official', version: '1.20.1'
    runs {
        client {
            workingDirectory project.file('run')
            property 'forge.logging.markers', 'REGISTRIES'
            property 'forge.logging.console.level', 'debug'
            mods {
                createlawn {
                    source sourceSets.main
                }
            }
        }
    }
}

repositories {
    maven { url = "https://maven.blamejared.com/" }
    maven { url = "https://maven.tterrag.com/" }
    maven { url = "https://modmaven.dev" }
}

dependencies {
    minecraft 'net.minecraftforge:forge:1.20.1-47.3.0'
    implementation fg.deobf("com.simibubi.create:create-1.20.1:0.6.5.i:slim") { transitive = false }
    implementation fg.deobf("com.jozufozu.flywheel:flywheel-forge-1.20.1:0.6.10")
    implementation fg.deobf("com.tterrag.registrate:Registrate:MC1.20-1.3.3")
}
